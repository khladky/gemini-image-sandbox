<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: monospace;
      font-size: 13px;
      width: 380px;
      padding: 14px;
      background: #fff;
      color: #1a1a1a;
    }
    h2 {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 10px;
    }
    #key-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    #api-key {
      flex: 1;
      font-size: 12px;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    #save-key-btn {
      font-size: 12px;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background: #4285f4;
      color: #fff;
      cursor: pointer;
    }
    #photo-wrap {
      margin-bottom: 10px;
    }
    #photo {
      width: 100%;
      border-radius: 6px;
      display: none;
    }
    label {
      display: block;
      font-size: 11px;
      color: #999;
      margin-bottom: 4px;
    }
    textarea {
      width: 100%;
      font-family: monospace;
      font-size: 13px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
      background: #fff;
      line-height: 1.5;
    }
    #query { min-height: 80px; margin-bottom: 10px; }
    #response { min-height: 180px; background: #fafafa; }
    button.primary {
      width: 100%;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 0;
      border: none;
      border-radius: 8px;
      background: #4285f4;
      color: #fff;
      cursor: pointer;
      margin: 10px 0 8px;
    }
    button.primary:disabled { opacity: 0.5; cursor: default; }
    button.primary:hover:not(:disabled) { background: #3367d6; }
    #status {
      font-size: 12px;
      color: #666;
      text-align: center;
      min-height: 18px;
    }
    #status.error { color: #c00; font-weight: 700; }
    #status.warning { color: #7c4a00; }
    #response strong { font-weight: 700; }
    #response em { font-style: italic; }
    #response h1, #response h2, #response h3 {
      font-weight: 700; margin: 8px 0 4px; color: #222;
    }
    #response h1 { font-size: 16px; }
    #response h2 { font-size: 15px; }
    #response h3 { font-size: 14px; }
    #response p { margin: 0 0 8px; }
    #response ul, #response ol { margin: 0 0 8px; padding-left: 20px; }
    #response li { margin-bottom: 4px; }
    #copy-btn {
      width: 100%;
      font-family: inherit;
      font-size: 12px;
      padding: 6px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
  <h2>Flickr Gemini Sandbox</h2>

  <div id="key-row">
    <input id="api-key" type="password" placeholder="Paste Gemini API key…">
    <button id="save-key-btn">Save</button>
  </div>

  <div id="photo-wrap">
    <img id="photo" alt="Flickr photo">
  </div>

  <label for="query">Query</label>
  <textarea id="query" placeholder="Type your Gemini query here…"></textarea>

  <button class="primary" id="ask-btn" disabled>Ask Gemini</button>
  <div id="status"></div>

  <label for="response-label" style="margin-top:10px;">Response</label>
  <div id="response" style="
    min-height:180px; padding:10px 12px; border:1px solid #ccc; border-radius:6px;
    background:#fafafa; font-size:13px; line-height:1.7; color:#1a1a1a;
    white-space:pre-wrap; overflow-y:auto; max-height:400px;
    font-family: monospace;
  "><span style="color:#aaa;">Response will appear here…</span></div>
  <button id="copy-btn">📋 Copy response</button>

  <script src="popup.js"></script>
</body>
</html>
