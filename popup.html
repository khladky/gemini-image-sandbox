<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      width: 380px;
      padding: 14px;
      background: #fff;
      color: #1a1a1a;
    }
    h2 { font-size: 13px; font-weight: 600; color: #555; }
    #key-row { display: flex; gap: 6px; margin-bottom: 8px; }
    #api-key { flex: 1; font-size: 12px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; }
    #save-key-btn { font-size: 12px; padding: 6px 10px; border: none; border-radius: 6px; background: #4285f4; color: #fff; cursor: pointer; }
    #model-select { width: 100%; font-size: 12px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; margin-bottom: 10px; }
    #photo-wrap { margin-bottom: 8px; }
    #photo { width: 100%; height: 200px; object-fit: contain; border-radius: 6px; display: none; background: #f0f0f0; }
    #drop-zone { display: none; margin-top: 4px; border: 2px dashed #ccc; border-radius: 6px; padding: 10px; text-align: center; font-size: 11px; color: #aaa; transition: border-color 0.2s; }
    #drop-zone.over { border-color: #4285f4; color: #4285f4; background: #f0f5ff; }
    #paste-btn { display: none; margin-top: 6px; width: 100%; font-size: 12px; padding: 6px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; }
    label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; }
    textarea { width: 100%; font-family: monospace; font-size: 13px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; resize: vertical; background: #fff; line-height: 1.5; }
    #query { min-height: 80px; margin-bottom: 10px; }
    #response { min-height: 180px; background: #fafafa; }
    button.primary { width: 100%; font-family: inherit; font-size: 13px; font-weight: 500; padding: 9px 0; border: none; border-radius: 8px; background: #4285f4; color: #fff; cursor: pointer; margin: 10px 0 8px; }
    button.primary:disabled { opacity: 0.5; cursor: default; }
    button.primary:hover:not(:disabled) { background: #3367d6; }
    #status { font-size: 12px; color: #666; text-align: center; min-height: 18px; }
    #status.error { color: #c00; font-weight: 700; }
    #status.warning { color: #7c4a00; }
    #status.success { color: #276749; background: #e6f7ec; border: 1px solid #38a169; border-radius: 6px; padding: 8px 12px; font-weight: 600; }
    #copy-btn { width: 100%; font-family: inherit; font-size: 12px; padding: 6px 0; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; display: none; }
  </style>
</head>
<body>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <h2>Gemini Image Sandbox</h2>
    <button id="clear-cache-btn" style="font-size:11px;color:#e53e3e;background:none;border:none;cursor:pointer;">Clear cache</button>
  </div>

  <div id="key-row">
    <input id="api-key" type="password" placeholder="Paste Gemini API key">
    <button id="save-key-btn">Save</button>
  </div>

  <select id="model-select">
    <option value="gemini-3.5-flash">gemini-3.5-flash (slow, may truncate)</option>
    <option value="gemini-3.1-flash-lite" selected>gemini-3.1-flash-lite (recommended)</option>
    <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview (most capable)</option>
    <option value="gemini-2.5-flash">gemini-2.5-flash (older)</option>
    <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (older)</option>
  </select>

  <div id="photo-wrap">
    <img id="photo" alt="Image">
    <div id="drop-zone">Drop an image here, or copy one (Win+Shift+S or open in new tab) then click Paste</div>
    <button id="paste-btn">Paste image from clipboard</button>
  </div>

  <label for="query">Query</label>
  <textarea id="query" placeholder="Type your Gemini query here"></textarea>

  <button class="primary" id="ask-btn" disabled>Ask Gemini</button>
  <div id="status"></div>

  <label for="response" style="margin-top:10px;">Response</label>
  <textarea id="response" readonly placeholder="Response will appear here"></textarea>
  <button id="copy-btn">Copy response</button>

  <script src="popup.js"></script>
</body>
</html>
